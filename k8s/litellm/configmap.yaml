apiVersion: v1
kind: ConfigMap            # ConfigMap：把配置文件内容存进 K8s，供 Pod 挂载使用
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: local-mistral
        litellm_params:
          model: ollama/mistral
          # docker-compose 里用 host.docker.internal，K8s (minikube) 里改用 host.minikube.internal
          # 如果 ollama 跑在其他地方，把这里的地址换成实际的 IP 或 Service 名
          api_base: http://host.minikube.internal:11434

    general_settings:
      master_key: sk-master
      global_max_parallel_requests: 5
