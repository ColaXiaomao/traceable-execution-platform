apiVersion: v1
kind: PersistentVolumeClaim
# 【当前】单节点模式，只有 1 个 PVC，用于验证 backend 能否通过 MinIO 实现无状态调度。
# 【未来】切换到分布式模式时，需要 4 个 或以上的数量的 PVC（每个 MinIO Pod 挂一个独立的盘），
#        同时 Deployment 改为 StatefulSet，每个 Pod 自动绑定对应编号的 PVC。
metadata:
  name: minio-pvc
spec:
  # storageClassName 不填，默认使用集群的 default StorageClass。
  # kind 集群里默认是 standard（local-path provisioner），会在某个节点的本地磁盘分配空间，
  # PVC 一旦绑定就固定在那个节点上。MinIO 是存储服务，固定节点是正常的，不需要像 backend 那样分散。
  accessModes:
    - ReadWriteOnce   # 单节点模式下一个节点读写即可；分布式模式每个 PVC 仍是 ReadWriteOnce，但各自独立
  resources:
    requests:
      storage: 10Gi   # 按需调整；分布式模式下每个 PVC 单独申请同等容量
