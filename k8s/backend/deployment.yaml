apiVersion: apps/v1
kind: Deployment
metadata:
  name: traceable-backend
  # metadata.name是 这个 Deployment 资源在 Kubernetes 里的名字。
  # kubectl get deployments可以看到它。
spec:
# spec 是 希望这个资源"长成什么样"。
  replicas: 1
  # 这个数字1代表着，希望永远有 1 个这样的 Pod 在运行。
  selector:
    matchLabels:
      app: traceable-backend
      # 在 Kubernetes 里，每个资源（Pod、Service、Deployment…）都可以带标签。标签本质是，key: value。
      # 上面这几行的意思是， Deployment 负责管理所有带有 app=traceable-backend 标签的 Pod，其中app和traceable-backend都没有具体含义，只代表标签。
      # 顺便讲一下 Pod 的名字，Deployment 创建 Pod 时，会自动生成名字，格式是：<deployment-name>-<replicaset-hash>-<随机后缀>。
  template:
  # template 相当于 "Pod 的制造蓝图"。
    metadata:
      labels:
        app: traceable-backend
    spec:
    # 这里的 spec 是 希望 pod"长成什么样"。
      containers:
        - name: backend
          # 一个 Pod 里有多个容器时，用名字区分。
          image: traceable-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              # 声明容器内部监听的端口。
          envFrom:
            # envFrom 会把整个 ConfigMap / Secret 里的所有 key 都注入为环境变量
            # 比逐条写 env: - name: ... value: ... 简洁很多
            - configMapRef:
                name: backend-config   # 对应 configmap.yaml
            - secretRef:
                name: backend-secret   # 对应 secret.yaml（敏感变量）

          volumeMounts:
            - name: artifact-storage
              mountPath: /app/data/artifacts
            - name: audit-storage
              mountPath: /app/data/audit

      volumes:
        - name: artifact-storage
          persistentVolumeClaim:
            claimName: artifact-pvc   # 对应 pvc.yaml
        - name: audit-storage
          persistentVolumeClaim:
            claimName: audit-pvc      # 对应 pvc.yaml
