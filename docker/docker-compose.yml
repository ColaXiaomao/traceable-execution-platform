version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: traceable-postgres
    environment:
      POSTGRES_DB: traceable_db
      POSTGRES_USER: traceable_user
      POSTGRES_PASSWORD: traceable_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 这里的postgres_data和底部的postgres_data一起，意思是：让 Docker 创建一个叫 postgres_data 的持久化存储卷。
      # /var/lib/postgresql/data 的意思是： 当前数据库容器内部的路径，是 PostgreSQL 官方镜像规定的数据库数据目录，让这个持久化存储卷挂载在这个路径。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceable_user -d traceable_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traceable-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: traceable-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
  # 一个只运行几秒钟的初始化容器，用 mc CLI 自动创建 artifacts bucket。
  # 讲一下 single responsibility（单一职责）。 容器里的服务应该只做一件事，即，运行服务本身。初始化任务应该交给独立的一次性容器。
  # 最后补充一下，MinIO 官方镜像 也不支持自动创建 bucket，所以必须要这个一次性容器来做。
  # 未来可能会在k8s里碰到 Init Containers，专门做这种事情。说是 Docker Compose 里的这个写法就是 模拟 Kubernetes init container。
    image: minio/mc:latest
    container_name: traceable-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/artifacts
      "
    # 在 Docker 里每个容器启动时都会执行一个命令。 这个命令就叫entrypoint（粗略说法，以后再深究）。
    # 这里的 entrypoint 就是 覆盖掉默认启动命令，改成执行 下面的脚本。
    # > 这个符号是 YAML 的多行字符串写法。
    # docker实际执行的是：
    # /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/artifacts"
    # 上面这一整行的命令说明：
    # /bin/sh 是 Linux 的 shell 程序， -c 是 执行后面这段字符串里的命令， 所以连起来是，用 shell 执行后面的命令。

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: traceable-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=sk-master
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]

  frontend:
    image: nginx:alpine
    container_name: traceable-frontend
    ports:
      - "3000:80"
      # 容器内部 Nginx 监听 80，映射到宿主机上的 3000。
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      # 表示启动顺序上 先启动 backend 再启动 frontend。

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: traceable-backend
    ports:
      - "8000:8000"

    # 把根目录 .env 注入容器
    env_file:
      - ../.env

    # 可选：只保留“想覆盖 .env 的”变量；否则可以整段删掉
    environment:
      - ARTIFACT_STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - MINIO_BUCKET_ARTIFACTS=artifacts
      - AUDIT_LOG_PATH=/app/data/audit
    volumes:
      - ../backend:/app/backend
      - ../scripts:/app/scripts
      - ../script_specs:/app/script_specs
      - audit_data:/app/data/audit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
        # TODO: 目前仅保证容器启动顺序，临时使用 service_started 。
        # 后续应为 litellm 添加 healthcheck，
        # 并将 condition 改为 service_healthy，
        # 以避免启动竞态问题（如 backend 启动时 LiteLLM 端口尚未监听）。
      minio-init:
        condition: service_completed_successfully

volumes:
# 这些volumes在文件的底部，声明这几个是持久化储存，也就是named volume，告诉 Docker "请创建这些卷"。
  postgres_data:
  redis_data:
  minio_data:
  audit_data:
